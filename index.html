<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicConnect Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <div id="app">
        <div id="map"></div>

        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">

        <header class="main-header">
            <div class="search-bar">
                <span class="material-icons">search</span>
                <input type="text" id="address-search" placeholder="Buscar no mapa...">
            </div>
        </header>

        <div id="notification-toast" class="toast"></div>

        <button id="btn-report" class="fab-report">
            <span class="material-icons">add_a_photo</span>
            <span>REPORTAR</span>
        </button>

        <aside class="security-panel">
            <button class="safe-btn" id="btn-safe">
                <span class="material-icons">check_circle</span> ESTOU SEGURO
            </button>
            <div class="alert-feed" id="alert-feed">
                <p class="alert-title">Alertas Ativos</p>
                </div>
        </aside>

        <div id="modal-report" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Análise de Ocorrência</h3>
                    <span class="close-modal" onclick="closeModal()">&times;</span>
                </div>
                
                <div class="photo-preview" id="photo-preview">
                    <span class="material-icons">sync</span>
                    <p id="ia-status">Processando imagem...</p>
                </div>

                <div class="form-group">
                    <label>Categoria Sugerida pela IA:</label>
                    <select id="category-select">
                        <option value="Iluminação">Iluminação Pública</option>
                        <option value="Asfalto">Buraco na Via</option>
                        <option value="Limpeza">Lixo/Entulho</option>
                        <option value="Segurança">Atividade Suspeita</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Descrição Adicional:</label>
                    <textarea id="report-description" placeholder="Opcional..."></textarea>
                </div>

                <button class="btn-send" id="btn-confirm-report">ENVIAR À PREFEITURA</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
